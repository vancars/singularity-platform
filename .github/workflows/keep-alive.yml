name: Keep Supabase alive

on:
  schedule:
    # Runs every 3 days at 8am UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase via API
        run: |
          curl -s https://singularity-platform.onrender.com/health
          echo "Pinged at $(date)"